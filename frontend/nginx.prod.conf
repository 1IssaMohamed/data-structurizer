server {
    listen 80;
    server_name algovisualizer.dev www.algovisualizer.dev;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name algovisualizer.dev www.algovisualizer.dev;

    # SSL Certificate Paths (Managed by Certbot on the host)
    ssl_certificate /etc/letsencrypt/live/algovisualizer.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/algovisualizer.dev/privkey.pem;

    # Serve the React application
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for the backend API
    location /trace {
        proxy_pass http://backend:8080/trace;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
