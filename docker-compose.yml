services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=development
      - PORT=8080
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:80

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/trace
    ports:
      - "5173:80"
    depends_on:
      - backend
