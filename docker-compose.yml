services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=development
      - PORT=8080
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:80,http://algovisualizer.dev,https://algovisualizer.dev

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/trace
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
